<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4A9EF5"/>
      <stop offset="100%" stop-color="#0F6BC0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g transform="translate(256,256)">

    <!-- explosion rays -->
    <g opacity="0.7">
      <line x1="0" y1="-20" x2="0" y2="-195" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <line x1="0" y1="20" x2="0" y2="195" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <line x1="-20" y1="0" x2="-195" y2="0" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <line x1="20" y1="0" x2="195" y2="0" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <line x1="-14" y1="-14" x2="-138" y2="-138" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
      <line x1="14" y1="14" x2="138" y2="138" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
      <line x1="14" y1="-14" x2="138" y2="-138" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
      <line x1="-14" y1="14" x2="-138" y2="138" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
      <line x1="-10" y1="-24" x2="-85" y2="-170" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="10" y1="24" x2="85" y2="170" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="24" y1="-10" x2="170" y2="-85" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="-24" y1="10" x2="-170" y2="85" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
    </g>

    <!-- explosion sparks -->
    <circle cx="-170" cy="-30" r="5" fill="#FFD700" opacity="0.8"/>
    <circle cx="160" cy="60" r="6" fill="#FFD700" opacity="0.7"/>
    <circle cx="-40" cy="-180" r="4" fill="#FFD700" opacity="0.6"/>
    <circle cx="80" cy="-160" r="5" fill="#FFA500" opacity="0.7"/>
    <circle cx="-130" cy="120" r="4" fill="#FFD700" opacity="0.6"/>
    <circle cx="30" cy="170" r="5" fill="#FFA500" opacity="0.7"/>

    <!-- shockwave rings -->
    <circle r="180" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
    <circle r="155" fill="none" stroke="#fff" stroke-width="3" opacity="0.1" stroke-dasharray="10,15"/>

    <!-- React-style atom orbits -->
    <ellipse rx="105" ry="35" fill="none" stroke="#fff" stroke-width="7" opacity="0.5"/>
    <ellipse rx="105" ry="35" fill="none" stroke="#fff" stroke-width="7" opacity="0.5" transform="rotate(60)"/>
    <ellipse rx="105" ry="35" fill="none" stroke="#fff" stroke-width="7" opacity="0.5" transform="rotate(120)"/>

    <!-- electrons on orbits -->
    <circle cx="105" cy="0" r="14" fill="#FFD700"/>
    <circle cx="-52.5" cy="90.9" r="14" fill="#00E5FF"/>
    <circle cx="-52.5" cy="-90.9" r="14" fill="#FF6B6B"/>

    <!-- central nucleus -->
    <circle r="28" fill="#fff"/>
    <circle r="20" fill="#208AEF"/>

    <!-- "bum" collision flash -->
    <g transform="rotate(-30)" opacity="0.6">
      <polygon points="0,-38 -6,-18 0,-24 6,-18" fill="#fff"/>
      <polygon points="-38,0 -18,-6 -24,0 -18,6" fill="#fff"/>
      <polygon points="38,0 18,-6 24,0 18,6" fill="#fff"/>
      <polygon points="0,38 -6,18 0,24 6,18" fill="#fff"/>
    </g>
    <circle r="12" fill="#FFD700" opacity="0.8"/>

  </g>
</svg>
