<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4A9EF5"/>
      <stop offset="100%" stop-color="#0F6BC0"/>
    </radialGradient>
  </defs>

  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <g transform="translate(96,96)">

    <!-- explosion rays -->
    <g opacity="0.6">
      <line x1="0" y1="-10" x2="0" y2="-80" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="0" y1="10" x2="0" y2="80" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="-10" y1="0" x2="-80" y2="0" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="10" y1="0" x2="80" y2="0" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="-7" y1="-7" x2="-56" y2="-56" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <line x1="7" y1="7" x2="56" y2="56" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <line x1="7" y1="-7" x2="56" y2="-56" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <line x1="-7" y1="7" x2="-56" y2="56" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    </g>

    <!-- sparks -->
    <circle cx="-65" cy="-15" r="3" fill="#FFD700" opacity="0.7"/>
    <circle cx="60" cy="30" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="-20" cy="-70" r="2.5" fill="#FFA500" opacity="0.6"/>
    <circle cx="30" cy="-60" r="2.5" fill="#FFD700" opacity="0.6"/>
    <circle cx="-50" cy="45" r="2" fill="#FFA500" opacity="0.6"/>

    <!-- React-style atom orbits -->
    <ellipse rx="40" ry="13" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.5"/>
    <ellipse rx="40" ry="13" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.5" transform="rotate(60)"/>
    <ellipse rx="40" ry="13" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.5" transform="rotate(120)"/>

    <!-- electrons -->
    <circle cx="40" cy="0" r="7" fill="#FFD700"/>
    <circle cx="-20" cy="34.6" r="7" fill="#00E5FF"/>
    <circle cx="-20" cy="-34.6" r="7" fill="#FF6B6B"/>

    <!-- nucleus -->
    <circle r="12" fill="#fff"/>
    <circle r="8" fill="#208AEF"/>

    <!-- collision flash -->
    <g transform="rotate(-30)" opacity="0.5">
      <polygon points="0,-18 -3,-8 0,-11 3,-8" fill="#fff"/>
      <polygon points="-18,0 -8,-3 -11,0 -8,3" fill="#fff"/>
      <polygon points="18,0 8,-3 11,0 8,3" fill="#fff"/>
      <polygon points="0,18 -3,8 0,11 3,8" fill="#fff"/>
    </g>
    <circle r="6" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>
